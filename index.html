<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visura — Image Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="noise"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-dot"></span>
                <span class="logo-text">Visura</span>
            </div>
            <span class="header-tag">Image Gallery</span>
        </div>
    </header>

    <main class="main">

        <section class="hero">
            <h1 class="hero-title">Your <em>Visual</em> Collection</h1>
            <p class="hero-sub">Paste any image URL, give it a name, and build your personal gallery.</p>
        </section>

        <div class="input-card">
            <div class="input-group-row">
                <div class="field">
                    <label for="url"><i class="fas fa-link"></i> Image URL</label>
                    <input type="url" id="url" placeholder="https://picsum.photos/400/300" autocomplete="off">
                </div>
                <div class="field">
                    <label for="name"><i class="fas fa-tag"></i> Image Name</label>
                    <input type="text" id="name" placeholder="e.g. Sunset in Goa" autocomplete="off">
                </div>
                <button onclick="generate()" id="generateBtn">
                    <i class="fas fa-plus"></i>
                    <span>Add Image</span>
                </button>
            </div>
            <p class="suggest">
                <i class="fas fa-lightbulb"></i>
                Try: <code>https://picsum.photos/400/300</code> or <code>https://picsum.photos/seed/raman/400/300</code>
            </p>
        </div>

        <div class="gallery-header">
            <span class="gallery-label">Gallery</span>
            <span class="gallery-count" id="gallery-count">0 images</span>
        </div>

        <div id="main-grid" class="image-grid"></div>

        <div class="empty-state" id="empty-state">
            <div class="empty-icon"><i class="fas fa-images"></i></div>
            <p class="empty-title">No images yet</p>
            <p class="empty-sub">Add your first image using the form above</p>
        </div>

    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-inner" onclick="event.stopPropagation()">
            <button class="lb-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
            <img id="lb-img" src="" alt="">
            <p id="lb-name"></p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">© 2026 Raman</span>
            <div class="social-icons">
                <a href="https://www.linkedin.com/in/ramanpal21/" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://t.me/Raman_2170" target="_blank" title="Telegram">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://github.com/ramanpal2123" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
